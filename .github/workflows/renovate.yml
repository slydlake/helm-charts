name: Renovate
# IMPORTANT: The Mend Renovate GitHub App must NOT be installed on this repo.
# This self-hosted workflow is the only Renovate instance that should run here.
# The Mend App cannot execute postUpgradeTasks with custom commands, which
# causes "Artifact file update failure" on every PR it creates.

on:
  # Re-evaluate open PRs after every merge so stale branches get rebased quickly
  push:
    branches:
      - main
  # Also run on a schedule to catch new upstream releases
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: {}

concurrency:
  group: renovate
  cancel-in-progress: false # let a running job finish; queue the next

jobs:
  renovate:
    name: renovate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@79dc0ba74dc3de28db0a7aeb1d0b95d5bf5fde2a # v46.1.13
        with:
          token: ${{ secrets.SLYBASE_GHCR_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: '["${{ github.repository }}"]'
          # allowedCommands must be set here (global/bot config), not in renovate.json
          # (formerly "allowedPostUpgradeCommands", renamed in Renovate v37+)
          RENOVATE_ALLOWED_COMMANDS: '["^python3 \\.github/scripts/update-chart-metadata\\.py ", "^pwd$"]'
          # Needed so Renovate can run postUpgradeTasks commands in the host
          # environment instead of a sandboxed container
          RENOVATE_X_EXEC_NO_DOCKER_EXEC: "true"
          LOG_LEVEL: "info"
