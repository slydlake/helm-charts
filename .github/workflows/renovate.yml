name: Renovate

on:
  # Re-evaluate open PRs after every merge so stale branches get rebased quickly
  push:
    branches:
      - main
  # Also run on a schedule to catch new upstream releases
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: {}

concurrency:
  group: renovate
  cancel-in-progress: false # let a running job finish; queue the next

jobs:
  renovate:
    name: renovate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@68a3ea99af6ad249940b5a9fdf44fc6d7f14378b # v46.1.6
        with:
          token: ${{ secrets.SLYBASE_GHCR_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: '["${{ github.repository }}"]'
          # allowedPostUpgradeCommands must be set here (global/bot config), not in renovate.json
          RENOVATE_ALLOWED_POST_UPGRADE_COMMANDS: '^python3 \.github/scripts/update-chart-metadata\.py |^pwd$'
          # Needed so Renovate can run postUpgradeTasks commands in the host
          # environment instead of a sandboxed container
          RENOVATE_X_EXEC_NO_DOCKER_EXEC: "true"
          LOG_LEVEL: "info"
