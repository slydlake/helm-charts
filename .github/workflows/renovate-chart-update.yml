name: Renovate PRs Update Chart Metadata

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  update-chart-metadata:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'renovate[bot]'
    concurrency:
      group: renovate-metadata-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: write
      issues: write
      pull-requests: write
      statuses: write

    steps:
      - name: Close empty-diff PR
        id: empty_check
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.issue.number;
            const pr = await github.rest.pulls.get({ owner, repo, pull_number });

            if (pr.data.changed_files > 0) {
              core.setOutput('is_empty', 'false');
              return;
            }

            const body = 'Closing: this Renovate PR has no file changes relative to main (duplicate/already merged).';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pull_number,
              per_page: 100,
            });

            if (!comments.some(comment => comment.user.login === 'github-actions[bot]' && comment.body === body)) {
              await github.rest.issues.createComment({ owner, repo, issue_number: pull_number, body });
            }

            await github.rest.git.deleteRef({
              owner,
              repo,
              ref: `heads/${pr.data.head.ref}`,
            });

            core.setOutput('is_empty', 'true');
            core.info(`Deleted stale branch ${pr.data.head.ref} for empty-diff PR #${pull_number}`);

      - name: Checkout PR branch
        if: steps.empty_check.outputs.is_empty != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        if: steps.empty_check.outputs.is_empty != 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Extract dependency changes
        if: steps.empty_check.outputs.is_empty != 'true'
        id: changes
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const regex = /\|\s*([^\|]+?)\s*\|\s*\w+\s*\|\s*`([^`]+)`\s*\u2192\s*`([^`]+)`\s*\|/g;
            const changes = [];
            let match;

            while ((match = regex.exec(body)) !== null) {
              changes.push(`Update ${match[1].trim()} to ${match[3].trim()}`);
            }

            if (changes.length === 0) {
              changes.push('Dependency update');
            }

            core.setOutput('descriptions', changes.join('\n'));
            core.info(`Extracted ${changes.length} change(s): ${changes.join(', ')}`);

      - name: Detect chart scope
        if: steps.empty_check.outputs.is_empty != 'true'
        id: scope
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.issue.number;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const chartDirs = [...new Set(
              files
                .map((file) => {
                  const match = file.filename.match(/^charts\/[^/]+/);
                  return match ? match[0] : null;
                })
                .filter(Boolean),
            )].sort();

            if (chartDirs.length === 0) {
              core.info('No chart changes detected');
              core.setOutput('skip', 'true');
              return;
            }

            if (chartDirs.length !== 1) {
              core.setFailed(`Expected exactly one chart directory, found ${chartDirs.length}: ${chartDirs.join(', ')}`);
              return;
            }

            core.setOutput('chart_dir', chartDirs[0]);
            core.setOutput('skip', 'false');

      - name: Update chart metadata and changelog
        if: steps.empty_check.outputs.is_empty != 'true' && steps.scope.outputs.skip != 'true'
        env:
          CHART_DIR: ${{ steps.scope.outputs.chart_dir }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          CHANGE_DESCRIPTIONS: ${{ steps.changes.outputs.descriptions }}
        run: |
          python3 .github/scripts/update-chart-metadata.py \
            --chart-dir "$CHART_DIR" \
            --pr-url "${{ github.event.pull_request.html_url }}" \
            --pr-labels "$PR_LABELS" \
            --change-descriptions "$CHANGE_DESCRIPTIONS"

      - name: Commit and push changes
        if: steps.empty_check.outputs.is_empty != 'true' && steps.scope.outputs.skip != 'true'
        id: commit
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add \
            "${{ steps.scope.outputs.chart_dir }}/Chart.yaml" \
            "${{ steps.scope.outputs.chart_dir }}/CHANGELOG.md"
          git commit -m "chore: update chart metadata"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "new_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Post chart-validate status
        if: steps.commit.outputs.pushed == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          NEW_SHA: ${{ steps.commit.outputs.new_sha }}
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.NEW_SHA,
              state: 'success',
              context: 'chart-validate',
              description: 'Chart validated (metadata-only commit)',
              target_url: `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            });

      - name: Enable auto-merge
        if: steps.empty_check.outputs.is_empty != 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.issue.number;
            const labels = (process.env.PR_LABELS || '').split(',').map(label => label.trim()).filter(Boolean);

            if (!labels.includes('automerge')) {
              core.info('No automerge label; skipping');
              return;
            }

            const pr = await github.rest.pulls.get({ owner, repo, pull_number });
            if (pr.data.auto_merge) {
              core.info('Auto-merge already enabled');
              return;
            }

            try {
              await github.rest.pulls.enableAutoMerge({
                owner,
                repo,
                pull_number,
                merge_method: 'merge',
              });
              core.info('Auto-merge enabled via REST');
            } catch (restErr) {
              core.warning(`REST enableAutoMerge failed: ${restErr.message}, trying GraphQL`);
              await github.graphql(`
                mutation($prId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $prId, mergeMethod: MERGE
                  }) { clientMutationId }
                }
              `, { prId: pr.data.node_id });
              core.info('Auto-merge enabled via GraphQL');
            }

      - name: Post update-chart-metadata status
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          ORIG_SHA: ${{ github.event.pull_request.head.sha }}
          NEW_SHA: ${{ steps.commit.outputs.new_sha }}
          JOB_STATUS: ${{ job.status }}
          IS_EMPTY: ${{ steps.empty_check.outputs.is_empty }}
        with:
          script: |
            const sha = process.env.NEW_SHA || process.env.ORIG_SHA;
            const success = process.env.JOB_STATUS === 'success';
            const isEmpty = process.env.IS_EMPTY === 'true';

            const statusParams = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: success || isEmpty ? 'success' : 'failure',
              context: 'update-chart-metadata',
              target_url: `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              description: isEmpty
                ? 'Skipped (stale branch deleted, PR auto-closed)'
                : success ? 'Chart metadata updated' : 'Failed',
            };

            await github.rest.repos.createCommitStatus({ ...statusParams, sha });

            if (process.env.NEW_SHA && process.env.NEW_SHA !== process.env.ORIG_SHA) {
              await github.rest.repos.createCommitStatus({ ...statusParams, sha: process.env.ORIG_SHA });
            }
