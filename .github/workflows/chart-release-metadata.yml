name: Update Chart Release Metadata

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - prerelease
    paths:
      - "charts/**"
      - ".github/actions/detect-changed-charts/**"
      - ".github/scripts/update-chart-metadata.py"
      - ".github/workflows/chart-release-metadata.yml"

jobs:
  chart-release-metadata:
    name: chart-release-metadata
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'renovate[bot]' || github.event.pull_request.user.login == 'app/renovate'
    concurrency:
      group: chart-release-metadata-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Generate GitHub App Token (with fallback)
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.SLYBASE_APP_ID }}
          private-key: ${{ secrets.SLYBASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
        continue-on-error: true

      - name: Resolve push token
        id: push-token
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${{ steps.app-token.outputs.token }}" ]; then
            echo "Using GitHub App token for metadata branch push"
            echo "token=${{ steps.app-token.outputs.token }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${{ secrets.SLYBASE_GHCR_TOKEN }}" ]; then
            echo "Using PAT fallback for metadata branch push"
            echo "token=${{ secrets.SLYBASE_GHCR_TOKEN }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Using GITHUB_TOKEN fallback for metadata branch push"
          echo "token=${{ secrets.GITHUB_TOKEN }}" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ steps.push-token.outputs.token }}

      - name: Detect changed charts
        id: charts
        uses: ./.github/actions/detect-changed-charts

      - name: Extract dependency changes
        id: pr
        if: steps.charts.outputs.has_charts == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const labels = (context.payload.pull_request.labels || [])
              .map((label) => typeof label === 'string' ? label : label.name)
              .filter(Boolean);

            const regex = /\|\s*([^\|]+?)\s*\|\s*\w+\s*\|\s*`([^`]+)`\s*\u2192\s*`([^`]+)`\s*\|/g;
            const changes = [];
            const body = context.payload.pull_request.body || '';
            let match;

            while ((match = regex.exec(body)) !== null) {
              changes.push(`Update ${match[1].trim()} to ${match[3].trim()}`);
            }

            if (changes.length === 0) {
              changes.push('Dependency update');
            }

            core.setOutput('pr_url', context.payload.pull_request.html_url || '');
            core.setOutput('pr_labels', labels.join(','));
            core.setOutput('change_descriptions', changes.join('\n'));

      - name: Configure Git
        if: steps.charts.outputs.has_charts == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Update chart metadata and changelog
        if: steps.charts.outputs.has_charts == 'true'
        env:
          CHARTS_JSON: ${{ steps.charts.outputs.charts_json }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          PR_LABELS: ${{ steps.pr.outputs.pr_labels }}
          CHANGE_DESCRIPTIONS: ${{ steps.pr.outputs.change_descriptions }}
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t chart_dirs < <(printf '%s' "$CHARTS_JSON" | jq -r '.[]')

          if [ "${#chart_dirs[@]}" -eq 0 ]; then
            echo "No chart changes detected"
            exit 0
          fi

          if [ "${#chart_dirs[@]}" -ne 1 ]; then
            echo "Expected exactly one changed chart, found ${#chart_dirs[@]}: ${chart_dirs[*]}" >&2
            exit 1
          fi

          chart_dir="${chart_dirs[0]}"

          python3 .github/scripts/update-chart-metadata.py \
            --chart-dir "$chart_dir" \
            --pr-url "$PR_URL" \
            --pr-labels "$PR_LABELS" \
            --change-descriptions "$CHANGE_DESCRIPTIONS"

          if git diff --quiet; then
            echo "No metadata changes to commit"
            exit 0
          fi

          git add "$chart_dir/Chart.yaml" "$chart_dir/CHANGELOG.md"
          git commit -m "chore: update chart release metadata"

          if ! git push origin "HEAD:$TARGET_BRANCH"; then
            git pull --rebase origin "$TARGET_BRANCH"
            git push origin "HEAD:$TARGET_BRANCH"
          fi
