name: Renovate Reconcile PR Branches

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-behind-prs:
    runs-on: ubuntu-latest
    concurrency:
      group: renovate-reconcile-pr-branches
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Reconcile automerge PRs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          behind_comment_body='Auto-merge is configured, but this Renovate PR is behind main and could not be updated automatically. Recreate or rebase the branch before retrying.'

          post_comment_once() {
            local pr="$1"
            local body="$2"
            local existing_comment

            existing_comment=$(gh api "/repos/$REPO/issues/$pr/comments" --paginate \
              --jq '.[] | select(.user.login == "github-actions[bot]") | .body' \
              | grep -F -x "$body" \
              | head -n1 || true)

            if [[ -n "$existing_comment" ]]; then
              echo "Comment already exists on PR #$pr"
              return 0
            fi

            gh api --method POST "/repos/$REPO/issues/$pr/comments" -f body="$body" >/dev/null
          }

          prs=$(gh pr list --repo "$REPO" --state open --label automerge \
            --json number,isDraft --jq '.[] | select(.isDraft == false) | .number')

          if [[ -z "$prs" ]]; then
            echo "No open automerge PRs found"
            exit 0
          fi

          for pr in $prs; do
            read -r actor state head_sha changed_files < <(
              gh api "/repos/$REPO/pulls/$pr" \
                --jq '[.user.login, (.mergeable_state // "unknown"), .head.sha, (.changed_files // 0)] | @tsv'
            )

            echo "PR #$pr actor=$actor mergeable_state=$state head_sha=$head_sha changed_files=$changed_files"

            if [[ "$actor" != 'renovate[bot]' ]]; then
              continue
            fi

            # Skip PRs whose diff is already empty – content already merged into main via squash
            if [[ "$changed_files" == '0' ]]; then
              post_comment_once "$pr" 'This Renovate PR has no changed files relative to main. Its changes appear to be already merged (e.g. via a previous squash-merge). Skipping update-branch – Renovate will close this PR on the next scheduled run if no new update is available.' || true
              continue
            fi

            if [[ "$state" != 'behind' ]]; then
              continue
            fi

            if ! gh api --method PUT "/repos/$REPO/pulls/$pr/update-branch" -f expected_head_sha="$head_sha" >/dev/null; then
              post_comment_once "$pr" "$behind_comment_body" || true
              continue
            fi

            echo "Updated PR #$pr – re-checking diff"
            sleep 5
            new_changed=$(gh api "/repos/$REPO/pulls/$pr" --jq '.changed_files // 0')
            echo "PR #$pr changed_files after update: $new_changed"
            if [[ "$new_changed" == '0' ]]; then
              post_comment_once "$pr" 'This Renovate PR diff became empty after updating the branch. The Renovate changes appear to already be in main via a squash-merge. Skipping auto-merge retry – Renovate will handle cleanup on the next scheduled run.' || true
              echo "PR #$pr diff empty after update – skipping"
            fi
          done
