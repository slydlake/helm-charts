name: Renovate Reconcile

on:
  push:
    branches:
      - main

jobs:
  reconcile:
    name: Rebase conflicting Renovate PRs
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Tick rebase checkbox for conflicting Renovate PRs
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const { owner, repo } = context.repo;

            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const renovatePRs = prs.filter(
              (pr) =>
                pr.user.login === 'renovate[bot]' &&
                pr.labels.some((l) => l.name === 'automerge'),
            );

            core.info(`Checking ${renovatePRs.length} open Renovate automerge PRs`);

            for (const pr of renovatePRs) {
              // Fetch individual PR to get mergeable_state (not available in list response)
              const { data: fullPr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pr.number,
              });

              if (fullPr.mergeable_state !== 'dirty') {
                core.info(`PR #${pr.number}: state=${fullPr.mergeable_state ?? 'null'}, skipping`);
                continue;
              }

              const body = fullPr.body ?? '';
              const updated = body.replace(
                /- \[ \] <!-- rebase-check -->/,
                '- [x] <!-- rebase-check -->',
              );

              if (updated === body) {
                core.info(`PR #${pr.number}: rebase checkbox already checked or not found`);
                continue;
              }

              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                body: updated,
              });

              core.info(`PR #${pr.number} "${pr.title}": rebase checkbox ticked`);
            }
