name: Reconcile Renovate PR Branches

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-behind-prs:
    runs-on: ubuntu-latest
    concurrency:
      group: reconcile-renovate-pr-branches
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Reconcile automerge PRs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          behind_comment_body='Auto-merge is configured, but this Renovate PR is behind main and could not be updated automatically. Recreate or rebase the branch before retrying.'

          post_comment_once() {
            local pr="$1"
            local body="$2"
            local existing_comment

            existing_comment=$(gh api "/repos/$REPO/issues/$pr/comments" --paginate \
              --jq '.[] | select(.user.login == "github-actions[bot]") | .body' \
              | grep -F -x "$body" \
              | head -n1 || true)

            if [[ -n "$existing_comment" ]]; then
              echo "Comment already exists on PR #$pr"
              return 0
            fi

            gh api --method POST "/repos/$REPO/issues/$pr/comments" -f body="$body" >/dev/null
          }

          prs=$(gh pr list --repo "$REPO" --state open --label automerge \
            --json number,isDraft --jq '.[] | select(.isDraft == false) | .number')

          if [[ -z "$prs" ]]; then
            echo "No open automerge PRs found"
            exit 0
          fi

          for pr in $prs; do
            read -r actor state head_sha head_ref < <(
              gh api "/repos/$REPO/pulls/$pr" \
                --jq '[.user.login, (.mergeable_state // "unknown"), .head.sha, .head.ref] | @tsv'
            )

            echo "PR #$pr actor=$actor mergeable_state=$state head_sha=$head_sha head_ref=$head_ref"

            if [[ "$actor" != 'renovate[bot]' ]]; then
              continue
            fi

            if [[ "$state" != 'behind' ]]; then
              continue
            fi

            if gh api --method PUT "/repos/$REPO/pulls/$pr/update-branch" -f expected_head_sha="$head_sha" >/dev/null; then
              echo "Updated PR #$pr"
              continue
            fi

            if post_comment_once "$pr" "$behind_comment_body"; then
              echo "Posted fallback comment on PR #$pr"
            else
              echo "Warning: could not post comment on PR #$pr"
            fi
          done
