name: Release Charts to OCI Registry

on:
  push:
    branches:
      - main
      - prerelease
    paths:
      - "charts/**"
      - ".github/actions/detect-changed-charts/**"
      - ".github/workflows/oci-release.yaml"
  pull_request:
    branches:
      - main
      - prerelease
    paths:
      - "charts/**"
      - ".github/actions/detect-changed-charts/**"
      - ".github/workflows/oci-release.yaml"
  workflow_dispatch:
    inputs:
      chart:
        description: "Chart to test (wg-easy, wireguard, wordpress)"
        required: true
        default: "wg-easy"
        type: choice
        options:
          - wg-easy
          - wireguard
          - wordpress
      force:
        description: "Force push even if version exists"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  discover-charts:
    name: Discover Charts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      charts_json: ${{ steps.charts.outputs.charts_json }}
      has_charts: ${{ steps.charts.outputs.has_charts }}
    steps:
      - name: Checkout workflow sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve chart matrix
        id: charts
        uses: ./.github/actions/detect-changed-charts
        with:
          manual-chart: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.chart || '' }}

  push-release-gate:
    name: Decide Push Publish Policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_publish: ${{ steps.gate.outputs.should_publish }}
    steps:
      - name: Decide whether this push should publish
        id: gate
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            if (context.eventName !== 'push') {
              core.setOutput('should_publish', 'true');
              core.info('Publish gate bypassed for non-push event.');
              return;
            }

            const { owner, repo } = context.repo;
            const headCommitMessage = context.payload.head_commit?.message || '';

            if (/^chore: update chart release metadata$/.test(headCommitMessage)) {
              core.setOutput('should_publish', 'true');
              core.info('Publishing metadata follow-up commit.');
              return;
            }

            const associatedPullRequests = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: context.sha,
            });

            const targetBranch = context.ref.replace('refs/heads/', '');
            const mergedRenovatePullRequest = associatedPullRequests.data.find((pullRequest) => (
              pullRequest.merged_at
              && pullRequest.base?.ref === targetBranch
              && pullRequest.user?.login === 'renovate[bot]'
            ));

            if (mergedRenovatePullRequest) {
              core.setOutput('should_publish', 'false');
              core.info(`Skipping publish for merged Renovate PR #${mergedRenovatePullRequest.number}; waiting for metadata commit.`);
              return;
            }

            core.setOutput('should_publish', 'true');

  pr-preview:
    name: Release Preview
    if: github.event_name == 'pull_request' && needs.discover-charts.outputs.has_charts == 'true'
    needs: discover-charts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        chart_dir: ${{ fromJson(needs.discover-charts.outputs.charts_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Package chart preview
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p packages

          echo "::group::${{ matrix.chart_dir }}"
          helm dependency build "${{ matrix.chart_dir }}"
          helm package "${{ matrix.chart_dir }}" --destination ./packages
          echo "::endgroup::"

  oci-release:
    name: Release to OCI Registry
    if: github.event_name != 'pull_request' && needs.discover-charts.outputs.has_charts == 'true' && needs.push-release-gate.outputs.should_publish == 'true'
    needs:
      - discover-charts
      - push-release-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FORCE_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force || 'false' }}
    strategy:
      matrix:
        chart_dir: ${{ fromJson(needs.discover-charts.outputs.charts_json) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Install ORAS (for ArtifactHub metadata)
        run: |
          curl -LO "https://github.com/oras-project/oras/releases/download/v1.2.0/oras_1.2.0_linux_amd64.tar.gz"
          mkdir -p oras-install/
          tar -zxf oras_*.tar.gz -C oras-install/
          sudo mv oras-install/oras /usr/local/bin/
          rm -rf oras_*.tar.gz oras-install/

      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Generate GitHub App Token (with fallback)
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ secrets.SLYBASE_APP_ID }}
          private-key: ${{ secrets.SLYBASE_APP_PRIVATE_KEY }}
          owner: SlyBase
        continue-on-error: true

      - name: Debug authentication and registry access
        run: |
          echo "=== Debug Info ==="
          echo "GitHub Actor: ${{ github.actor }}"
          echo "Event: ${{ github.event_name }}"
          echo "Target registry: ghcr.io/slybase/charts"

          if [ -n "${{ secrets.SLYBASE_GHCR_TOKEN }}" ]; then
            echo "Using Personal Access Token (preferred for package creation)"
            token="${{ secrets.SLYBASE_GHCR_TOKEN }}"
          elif [ -n "${{ steps.app-token.outputs.token }}" ]; then
            echo "Using GitHub App token (may have limitations for new packages)"
            token="${{ steps.app-token.outputs.token }}"
          else
            echo "❌ No authentication token available!"
            exit 1
          fi

          if curl -s -f -H "Authorization: Bearer $token" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/orgs/SlyBase >/dev/null; then
            echo "✅ Token can access SlyBase org"
          else
            echo "❌ Token cannot access SlyBase org"
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.SLYBASE_GHCR_TOKEN || steps.app-token.outputs.token }}

      - name: Resolve chart context
        id: chart
        shell: bash
        run: |
          set -euo pipefail

          chart_dir="${{ matrix.chart_dir }}"
          chart_name=$(basename "$chart_dir")
          chart_version=$(helm show chart "$chart_dir" | awk '/^version:/ { print $2 }')

          echo "chart_dir=$chart_dir" >> "$GITHUB_OUTPUT"
          echo "chart_name=$chart_name" >> "$GITHUB_OUTPUT"
          echo "chart_version=$chart_version" >> "$GITHUB_OUTPUT"

      - name: Check release policy and registry state
        id: publish-check
        shell: bash
        run: |
          set -euo pipefail

          chart_name="${{ steps.chart.outputs.chart_name }}"
          chart_version="${{ steps.chart.outputs.chart_version }}"

          if echo "$chart_version" | grep -qE '\-(alpha|beta|rc)'; then
            is_prerelease=true
          else
            is_prerelease=false
          fi

          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

          current_branch="${{ github.ref_name }}"

          if [ "$FORCE_PUBLISH" != 'true' ]; then
            if [ "$current_branch" = 'main' ] && [ "$is_prerelease" = 'true' ]; then
              echo "⏭️ Skipping: Prerelease version $chart_version not allowed on main branch (use force to override)"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "$current_branch" = 'prerelease' ] && [ "$is_prerelease" = 'false' ]; then
              echo "⏭️ Skipping: Stable version $chart_version not allowed on prerelease branch (use force to override)"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if helm pull "oci://ghcr.io/slybase/charts/$chart_name" --version "$chart_version" 2>/dev/null; then
            echo "Chart $chart_name:$chart_version already exists in registry"
            if [ "$FORCE_PUBLISH" = 'true' ]; then
              echo "Force flag set - will overwrite existing version"
              echo "skip=false" >> "$GITHUB_OUTPUT"
            else
              echo "skip=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Chart $chart_name:$chart_version does not exist, will publish"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package and push chart to OCI registry
        if: steps.publish-check.outputs.skip == 'false'
        id: push
        shell: bash
        run: |
          set -euo pipefail

          chart_dir="${{ steps.chart.outputs.chart_dir }}"
          chart_name="${{ steps.chart.outputs.chart_name }}"
          chart_version="${{ steps.chart.outputs.chart_version }}"

          echo "Packaging chart $chart_name version $chart_version"

          mkdir -p packages
          helm dependency build "$chart_dir"
          helm package "$chart_dir" --destination ./packages

          echo "Pushing to OCI registry: oci://ghcr.io/slybase/charts"
          echo "Chart file: ./packages/${chart_name}-${chart_version}.tgz"

          set -x
          push_output=$(helm push "./packages/${chart_name}-${chart_version}.tgz" "oci://ghcr.io/slybase/charts" 2>&1) || {
            echo "Helm push failed with exit code $?"
            echo "$push_output"
            exit 1
          }
          set +x

          echo "$push_output"

          digest=$(echo "$push_output" | grep -o 'sha256:[a-f0-9]\{64\}' | head -1)
          if [ -z "$digest" ]; then
            echo "Failed to extract digest from push output"
            exit 1
          fi

          chart_ref="ghcr.io/slybase/charts/${chart_name}@${digest}"
          echo "chart_digest=$digest" >> "$GITHUB_OUTPUT"
          echo "chart_ref=$chart_ref" >> "$GITHUB_OUTPUT"

      - name: Sign chart with Cosign
        if: steps.publish-check.outputs.skip == 'false' && steps.push.outputs.chart_ref != ''
        run: |
          chart_ref="${{ steps.push.outputs.chart_ref }}"
          cosign sign --yes "$chart_ref"

      - name: Verify chart signature
        if: steps.publish-check.outputs.skip == 'false' && steps.push.outputs.chart_ref != ''
        run: |
          chart_ref="${{ steps.push.outputs.chart_ref }}"
          cosign verify "$chart_ref" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/oci-release.yaml@refs/heads/${{ github.ref_name }}"

      - name: Output chart information
        if: steps.publish-check.outputs.skip == 'false'
        run: |
          chart_name="${{ steps.chart.outputs.chart_name }}"
          chart_version="${{ steps.chart.outputs.chart_version }}"
          chart_ref="${{ steps.push.outputs.chart_ref }}"

          echo "📦 Chart: $chart_name"
          echo "🏷️  Version: $chart_version"
          echo "📍 Reference: $chart_ref"
          echo "✅ Signed and verified with Cosign"
          echo ""
          echo "To use this chart with Helm:"
          echo "helm install my-release oci://ghcr.io/slybase/charts/$chart_name --version $chart_version"

      - name: Upload ArtifactHub metadata for this chart
        if: steps.publish-check.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail

          chart_name="${{ steps.chart.outputs.chart_name }}"

          if [ -f "charts/$chart_name/artifacthub-repo.yml" ]; then
            metadata_file="charts/$chart_name/artifacthub-repo.yml"
          else
            metadata_file="artifacthub-repo.yml"
          fi

          tmp_config="$(mktemp)"
          tmp_manifest="$(mktemp)"
          cleanup() {
            rm -f "$tmp_config" "$tmp_manifest"
          }
          trap cleanup EXIT

          printf '{}' > "$tmp_config"

          oras push \
            "ghcr.io/slybase/charts/$chart_name:artifacthub.io" \
            --config "$tmp_config:application/vnd.cncf.artifacthub.config.v1+yaml" \
            "$metadata_file:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml"

          oras manifest fetch "ghcr.io/slybase/charts/$chart_name:artifacthub.io" > "$tmp_manifest"
          jq -e '.config.size > 0 and .config.mediaType == "application/vnd.cncf.artifacthub.config.v1+yaml" and (.layers | length) == 1' "$tmp_manifest"
