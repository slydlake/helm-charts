name: Release Charts to OCI Registry

on:
  push:
    branches:
      - main
      - prerelease
    paths:
      - "charts/**"
      - ".github/actions/detect-changed-charts/**"
      - ".github/workflows/oci-release.yaml"
  pull_request:
    branches:
      - main
      - prerelease
    paths:
      - "charts/**"
      - ".github/actions/detect-changed-charts/**"
      - ".github/workflows/oci-release.yaml"
  workflow_dispatch:
    inputs:
      chart:
        description: "Chart to test (wg-easy, wireguard, wordpress)"
        required: true
        default: "wg-easy"
        type: choice
        options:
          - wg-easy
          - wireguard
          - wordpress
      force:
        description: "Force push even if version exists"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HELM_VERSION: v3.18.3
  ORAS_VERSION: 1.2.0

jobs:
  discover-charts:
    name: Discover Charts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      charts_json: ${{ steps.charts.outputs.charts_json }}
      has_charts: ${{ steps.charts.outputs.has_charts }}
    steps:
      - name: Checkout workflow sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve chart matrix
        id: charts
        uses: ./.github/actions/detect-changed-charts
        with:
          manual-chart: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.chart || '' }}

  pr-preview:
    name: Release Preview
    if: github.event_name == 'pull_request' && needs.discover-charts.outputs.has_charts == 'true'
    needs: discover-charts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        chart_dir: ${{ fromJson(needs.discover-charts.outputs.charts_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install Helm
        shell: bash
        run: |
          set -euo pipefail

          archive="helm-${HELM_VERSION}-linux-amd64.tar.gz"
          curl -fsSLO "https://get.helm.sh/${archive}"
          tar -zxf "$archive"
          sudo mv linux-amd64/helm /usr/local/bin/helm
          rm -rf "$archive" linux-amd64

          helm version --short

      - name: Package chart preview
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p packages

          echo "::group::${{ matrix.chart_dir }}"
          helm dependency build "${{ matrix.chart_dir }}"
          helm package "${{ matrix.chart_dir }}" --destination ./packages
          echo "::endgroup::"

  oci-release:
    name: Release to OCI Registry
    if: github.event_name != 'pull_request' && needs.discover-charts.outputs.has_charts == 'true'
    needs: discover-charts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FORCE_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force || 'false' }}
    strategy:
      matrix:
        chart_dir: ${{ fromJson(needs.discover-charts.outputs.charts_json) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Install Helm
        shell: bash
        run: |
          set -euo pipefail

          archive="helm-${HELM_VERSION}-linux-amd64.tar.gz"
          curl -fsSLO "https://get.helm.sh/${archive}"
          tar -zxf "$archive"
          sudo mv linux-amd64/helm /usr/local/bin/helm
          rm -rf "$archive" linux-amd64

          helm version --short

      - name: Install ORAS
        shell: bash
        run: |
          set -euo pipefail

          curl -fsSLO "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          mkdir -p oras-install/
          tar -zxf oras_*.tar.gz -C oras-install/
          sudo mv oras-install/oras /usr/local/bin/
          rm -rf oras_*.tar.gz oras-install/

          oras version

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Generate GitHub App Token (with fallback)
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.SLYBASE_APP_ID }}
          private-key: ${{ secrets.SLYBASE_APP_PRIVATE_KEY }}
          owner: SlyBase
        continue-on-error: true

      - name: Resolve registry authentication
        id: registry-auth
        shell: bash
        env:
          GHCR_PAT: ${{ secrets.SLYBASE_GHCR_TOKEN }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          FALLBACK_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "$GHCR_PAT" ]; then
            selected_token="$GHCR_PAT"
            token_source="pat"
          elif [ -n "$APP_TOKEN" ]; then
            selected_token="$APP_TOKEN"
            token_source="app"
          else
            selected_token="$FALLBACK_TOKEN"
            token_source="github"
          fi

          echo "::add-mask::$selected_token"
          {
            echo "token=$selected_token"
            echo "source=$token_source"
          } >> "$GITHUB_OUTPUT"

      - name: Debug authentication and registry access
        shell: bash
        env:
          REGISTRY_TOKEN: ${{ steps.registry-auth.outputs.token }}
          REGISTRY_TOKEN_SOURCE: ${{ steps.registry-auth.outputs.source }}
        run: |
          set -euo pipefail

          echo "=== Debug Info ==="
          echo "GitHub Actor: ${{ github.actor }}"
          echo "Event: ${{ github.event_name }}"
          echo "Target registry: ghcr.io/slybase/charts"

          if [ "$REGISTRY_TOKEN_SOURCE" = 'pat' ]; then
            echo "Using Personal Access Token (preferred for package creation)"
          elif [ "$REGISTRY_TOKEN_SOURCE" = 'app' ]; then
            echo "Using GitHub App token (may have limitations for new packages)"
          else
            echo "Using built-in GITHUB_TOKEN"
          fi

          if curl -s -f -H "Authorization: Bearer $REGISTRY_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/orgs/SlyBase >/dev/null; then
            echo "✅ Token can access SlyBase org"
          else
            echo "❌ Token cannot access SlyBase org"
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ steps.registry-auth.outputs.token }}

      - name: Resolve chart context
        id: chart
        shell: bash
        run: |
          set -euo pipefail

          chart_dir="${{ matrix.chart_dir }}"
          chart_name=$(basename "$chart_dir")
          chart_version=$(helm show chart "$chart_dir" | awk '/^version:/ { print $2 }')

          {
            echo "chart_dir=$chart_dir"
            echo "chart_name=$chart_name"
            echo "chart_version=$chart_version"
          } >> "$GITHUB_OUTPUT"

      - name: Check release policy and registry state
        id: publish-check
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          CHART_NAME: ${{ steps.chart.outputs.chart_name }}
          CHART_VERSION: ${{ steps.chart.outputs.chart_version }}
          CURRENT_BRANCH: ${{ github.ref_name }}
          FORCE_PUBLISH: ${{ env.FORCE_PUBLISH }}
        with:
          github-token: ${{ steps.registry-auth.outputs.token }}
          retries: 3
          script: |
            const chartName = process.env.CHART_NAME;
            const chartVersion = process.env.CHART_VERSION;
            const currentBranch = process.env.CURRENT_BRANCH;
            const forcePublish = process.env.FORCE_PUBLISH === 'true';
            const versionPattern = /^(\d+)\.(\d+)\.(\d+)(-.+)?$/;

            function parseVersion(version) {
              const match = versionPattern.exec(version.trim());
              if (!match) {
                throw new Error(`Unsupported chart version: ${version}`);
              }

              return {
                major: Number(match[1]),
                minor: Number(match[2]),
                patch: Number(match[3]),
                suffix: (match[4] ?? '').replace(/^-/, ''),
              };
            }

            function compareVersions(left, right) {
              const lhs = parseVersion(left);
              const rhs = parseVersion(right);

              for (const key of ['major', 'minor', 'patch']) {
                if (lhs[key] !== rhs[key]) {
                  return lhs[key] - rhs[key];
                }
              }

              const lhsStable = lhs.suffix === '';
              const rhsStable = rhs.suffix === '';

              if (lhsStable !== rhsStable) {
                return lhsStable ? 1 : -1;
              }

              return lhs.suffix.localeCompare(rhs.suffix);
            }

            const isPrerelease = /-(alpha|beta|rc)/.test(chartVersion);
            core.setOutput('is_prerelease', String(isPrerelease));
            core.setOutput('skip', 'false');

            let packageVersions = [];
            try {
              packageVersions = await github.paginate(
                'GET /orgs/{org}/packages/{package_type}/{package_name}/versions',
                {
                  org: 'SlyBase',
                  package_type: 'container',
                  package_name: `charts/${chartName}`,
                  per_page: 100,
                  headers: {
                    'X-GitHub-Api-Version': '2022-11-28',
                  },
                },
              );
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              core.info(`No published package found yet for ${chartName}.`);
            }

            const versions = [...new Set(
              packageVersions
                .flatMap((item) => item.metadata?.container?.tags ?? [])
                .filter((tag) => versionPattern.test(tag)),
            )];

            const latestPublishedVersion = versions.reduce(
              (latest, version) => {
                if (!latest || compareVersions(version, latest) > 0) {
                  return version;
                }

                return latest;
              },
              '',
            );

            const exactVersionExists = versions.includes(chartVersion);

            core.setOutput('latest_published_version', latestPublishedVersion);

            if (latestPublishedVersion) {
              core.info(`Latest published version for ${chartName} is ${latestPublishedVersion}.`);
            } else {
              core.info(`No published chart versions found for ${chartName}.`);
            }

            if (latestPublishedVersion && compareVersions(chartVersion, latestPublishedVersion) <= 0) {
              const message = `Chart version ${chartVersion} must be newer than latest published version ${latestPublishedVersion}`;
              if (forcePublish) {
                core.warning(`${message}; continuing because force=true`);
              } else {
                core.setFailed(message);
                return;
              }
            }

            if (!forcePublish) {
              if (currentBranch === 'main' && isPrerelease) {
                core.notice(`Skipping: Prerelease version ${chartVersion} not allowed on main branch (use force to override)`);
                core.setOutput('skip', 'true');
                return;
              }

              if (currentBranch === 'prerelease' && !isPrerelease) {
                core.notice(`Skipping: Stable version ${chartVersion} not allowed on prerelease branch (use force to override)`);
                core.setOutput('skip', 'true');
                return;
              }
            }

            if (exactVersionExists) {
              core.info(`Chart ${chartName}:${chartVersion} already exists in registry.`);
              if (forcePublish) {
                core.info('Force flag set - will overwrite existing version.');
                return;
              }

              core.setOutput('skip', 'true');
              return;
            }

            core.info(`Chart ${chartName}:${chartVersion} does not exist, will publish.`);

      - name: Package and push chart to OCI registry
        if: steps.publish-check.outputs.skip == 'false'
        id: push
        shell: bash
        run: |
          set -euo pipefail

          chart_dir="${{ steps.chart.outputs.chart_dir }}"
          chart_name="${{ steps.chart.outputs.chart_name }}"
          chart_version="${{ steps.chart.outputs.chart_version }}"

          echo "Packaging chart $chart_name version $chart_version"
          mkdir -p packages
          helm dependency build "$chart_dir"
          helm package "$chart_dir" --destination ./packages

          echo "Pushing to OCI registry: oci://ghcr.io/slybase/charts"
          echo "Chart file: ./packages/${chart_name}-${chart_version}.tgz"

          set -x
          push_output=$(helm push "./packages/${chart_name}-${chart_version}.tgz" "oci://ghcr.io/slybase/charts" 2>&1) || {
            echo "Helm push failed with exit code $?"
            echo "$push_output"
            exit 1
          }
          set +x

          echo "$push_output"

          digest=$(echo "$push_output" | grep -o 'sha256:[a-f0-9]\{64\}' | head -1)
          if [ -z "$digest" ]; then
            echo "Failed to extract digest from push output"
            exit 1
          fi

          chart_ref="ghcr.io/slybase/charts/${chart_name}@${digest}"
          {
            echo "chart_digest=$digest"
            echo "chart_ref=$chart_ref"
          } >> "$GITHUB_OUTPUT"

      - name: Sign chart with Cosign
        if: steps.publish-check.outputs.skip == 'false' && steps.push.outputs.chart_ref != ''
        run: |
          chart_ref="${{ steps.push.outputs.chart_ref }}"
          cosign sign --yes "$chart_ref"

      - name: Verify chart signature
        if: steps.publish-check.outputs.skip == 'false' && steps.push.outputs.chart_ref != ''
        run: |
          chart_ref="${{ steps.push.outputs.chart_ref }}"
          cosign verify "$chart_ref" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/oci-release.yaml@refs/heads/${{ github.ref_name }}"

      - name: Output chart information
        if: steps.publish-check.outputs.skip == 'false'
        run: |
          chart_name="${{ steps.chart.outputs.chart_name }}"
          chart_version="${{ steps.chart.outputs.chart_version }}"
          chart_ref="${{ steps.push.outputs.chart_ref }}"

          echo "📦 Chart: $chart_name"
          echo "🏷️  Version: $chart_version"
          echo "📍 Reference: $chart_ref"
          echo "✅ Signed and verified with Cosign"
          echo ""
          echo "To use this chart with Helm:"
          echo "helm install my-release oci://ghcr.io/slybase/charts/$chart_name --version $chart_version"

      - name: Upload ArtifactHub metadata for this chart
        if: steps.publish-check.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail

          chart_name="${{ steps.chart.outputs.chart_name }}"

          if [ -f "charts/$chart_name/artifacthub-repo.yml" ]; then
            metadata_file="charts/$chart_name/artifacthub-repo.yml"
          else
            metadata_file="artifacthub-repo.yml"
          fi

          tmp_config="$(mktemp)"
          tmp_manifest="$(mktemp)"
          cleanup() {
            rm -f "$tmp_config" "$tmp_manifest"
          }
          trap cleanup EXIT

          printf '{}' > "$tmp_config"

          oras push \
            "ghcr.io/slybase/charts/$chart_name:artifacthub.io" \
            --config "$tmp_config:application/vnd.cncf.artifacthub.config.v1+yaml" \
            "$metadata_file:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml"

          oras manifest fetch "ghcr.io/slybase/charts/$chart_name:artifacthub.io" > "$tmp_manifest"
          jq -e '.config.size > 0 and .config.mediaType == "application/vnd.cncf.artifacthub.config.v1+yaml" and (.layers | length) == 1' "$tmp_manifest"
